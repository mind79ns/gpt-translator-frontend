<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPT 양방향 음성 번역기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 20px; margin-bottom: 10px; }
        .language-selector { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 20px; }
        .language-selector select { width: 40%; padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.2); color: white; font-weight: bold; -webkit-appearance: none; appearance: none; text-align: center;}
        .language-selector select option { color: black; }
        .language-selector button { width: 40px; height: 40px; border-radius: 50%; border: none; background: white; color: #667eea; font-size: 20px; cursor: pointer; transition: transform 0.3s; flex-shrink: 0; }
        .language-selector button:hover { transform: scale(1.1) rotate(180deg); }
        .content { padding: 20px; }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        textarea { width: 100%; min-height: 100px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; resize: none; transition: border-color 0.3s; }
        textarea:focus { outline: none; border-color: #667eea; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-translate { background: linear-gradient(135deg, #667eea, #764ba2); grid-column: span 2; }
        .btn-mic { background: #ff6b6b; }
        .btn-mic.recording { animation: pulse 1.5s infinite; background: #ff5252; }
        .btn-clear { background: #868e96; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .result-section, .pronunciation-section { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .result-label, .pronunciation-label { font-size: 12px; color: #868e96; font-weight: bold; margin-bottom: 5px; display: block; }
        .btn-speak { background: #51cf66; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .btn-speak:disabled { background: #dee2e6; cursor: not-allowed; }
        #translation { font-size: 18px; color: #212529; line-height: 1.5; min-height: 40px; word-break: break-word; }
        #pronunciation { font-size: 14px; color: #495057; font-style: italic; min-height: 20px; }
        .settings { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; align-items: center; margin-bottom: 15px; }
        .settings select, .settings input[type="range"] { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: white; }
        .volume-control { display: flex; flex-direction: column; align-items: center; }
        .volume-value { font-size: 11px; color: #667eea; margin-top: 2px; }
        .status { text-align: center; font-size: 12px; color: #868e96; min-height: 20px; margin-top: 10px; }
        .status.error { color: #ff6b6b; }
        .status.success { color: #51cf66; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 GPT 양방향 음성 번역기</h1>
            <div class="language-selector">
                <select id="sourceLangSelect">
                    <option value="Korean">한국어</option>
                    <option value="Vietnamese">베트남어</option>
                    <option value="English">영어</option>
                </select>
                <button onclick="swapLanguages()">⇄</button>
                <select id="targetLangSelect">
                    <option value="Vietnamese">베트남어</option>
                    <option value="Korean">한국어</option>
                    <option value="English">영어</option>
                </select>
            </div>
        </div>
        
        <div class="content">
            <div class="input-wrapper">
                <textarea id="inputText" placeholder="번역할 텍스트를 입력하거나 마이크를 눌러 말씀하세요..."></textarea>
            </div>

            <div class="settings">
                <select id="voiceSelect">
                    <option value="nova">목소리: Nova (여성/선명)</option>
                    <option value="alloy">목소리: Alloy (남성/차분)</option>
                    <option value="shimmer">목소리: Shimmer (여성/부드러움)</option>
                    <option value="echo">목소리: Echo (남성/깊음)</option>
                    <option value="fable">목소리: Fable (남성/표현력)</option>
                    <option value="onyx">목소리: Onyx (남성/저음)</option>
                </select>
                <div class="volume-control">
                    <label for="volumeControl" style="font-size:12px; color:#868e96;">소리 크기</label>
                    <input type="range" id="volumeControl" min="0" max="1" value="0.7" step="0.1">
                    <span class="volume-value" id="volumeValue">70%</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-translate" onclick="handleTranslate()"><span>📝</span> 번역하기</button>
                <button class="btn-mic" id="micBtn" onclick="handleMic()"><span>🎤</span> <span id="micText">음성 입력</span></button>
                <button class="btn-clear" onclick="clearAll()"><span>🗑️</span> 지우기</button>
            </div>
            
            <div class="result-section">
                <div class="result-header">
                    <span class="result-label">번역 결과</span>
                    <button class="btn-speak" id="speakBtn" onclick="handleSpeak()" disabled>🔊 듣기</button>
                </div>
                <div id="translation">번역 결과가 여기에 표시됩니다</div>
            </div>
            
            <div class="pronunciation-section">
                <div class="pronunciation-label">발음 도우미</div>
                <div id="pronunciation">발음 표기가 여기에 표시됩니다</div>
            </div>
            
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://knstranslator.netlify.app/.netlify/functions/translate';
        
        const els = {
            inputText: document.getElementById('inputText'),
            translation: document.getElementById('translation'),
            pronunciation: document.getElementById('pronunciation'),
            status: document.getElementById('status'),
            micBtn: document.getElementById('micBtn'),
            micText: document.getElementById('micText'),
            speakBtn: document.getElementById('speakBtn'),
            sourceLangSelect: document.getElementById('sourceLangSelect'),
            targetLangSelect: document.getElementById('targetLangSelect'),
            voiceSelect: document.getElementById('voiceSelect'),
            volumeControl: document.getElementById('volumeControl'),
            volumeValue: document.getElementById('volumeValue'),
        };
        
        let currentTranslation = '';
        let recognition;
        let isRecording = false;
        let currentAudio = null;

        const langCodeMap = { 'Korean': 'ko-KR', 'Vietnamese': 'vi-VN', 'English': 'en-US' };

        // 볼륨 슬라이더 값 표시
        els.volumeControl.addEventListener('input', (e) => {
            els.volumeValue.textContent = Math.round(e.target.value * 100) + '%';
        });

        function swapLanguages() {
            const sourceValue = els.sourceLangSelect.value;
            const targetValue = els.targetLangSelect.value;
            els.sourceLangSelect.value = targetValue;
            els.targetLangSelect.value = sourceValue;
            clearAll();
        }

        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window)) {
                els.micBtn.disabled = true;
                return;
            }
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                els.micBtn.classList.add('recording');
                els.micText.textContent = '듣는 중...';
            };
            
            recognition.onresult = (event) => {
                els.inputText.value = event.results[0][0].transcript;
                handleTranslate();
            };
            
            recognition.onerror = (event) => showStatus(`음성 인식 오류: ${event.error}`, 'error');
            recognition.onend = () => {
                isRecording = false;
                els.micBtn.classList.remove('recording');
                els.micText.textContent = '음성 입력';
            };
        }

        async function handleTranslate() {
            const text = els.inputText.value.trim();
            if (!text) return;
            
            clearResult();
            els.translation.innerHTML = '<span>🔄</span> 번역 중...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'translate',
                        inputText: text,
                        targetLang: els.targetLangSelect.value
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                currentTranslation = data.translation;
                els.translation.textContent = currentTranslation;
                els.pronunciation.textContent = data.pronunciation || ' ';
                els.speakBtn.disabled = !currentTranslation;
                showStatus('✅ 번역 완료', 'success');
                
            } catch (error) {
                els.translation.textContent = '번역 실패';
                showStatus(`❌ ${error.message}`, 'error');
            }
        }

        async function handleSpeak() {
            if (!currentTranslation) return;
            
            // 이미 재생 중이면 중지
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                els.speakBtn.textContent = '🔊 듣기';
                currentAudio = null;
                return;
            }
            
            els.speakBtn.textContent = '⏳';
            els.speakBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                                    action: 'speak',
                                    inputText: currentTranslation,
                                    voice: els.voiceSelect.value,
                                    language: els.targetLangSelect.value  // 언어 정보 추가
                           })
                });
                
                if (!response.ok) throw new Error(`서버 오류 ${response.status}`);
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // 간단한 Audio 객체 사용 (볼륨 제어 개선)
                currentAudio = new Audio(audioUrl);
                currentAudio.volume = parseFloat(els.volumeControl.value);
                
                currentAudio.onplaying = () => {
                    els.speakBtn.textContent = '⏸️';
                    els.speakBtn.disabled = false;
                };
                
                currentAudio.onended = () => {
                    els.speakBtn.textContent = '🔊 듣기';
                    els.speakBtn.disabled = false;
                    currentAudio = null;
                };
                
                currentAudio.onerror = () => {
                    els.speakBtn.textContent = '🔊 듣기';
                    els.speakBtn.disabled = false;
                    showStatus('음성 재생 실패', 'error');
                };
                
                await currentAudio.play();
                
            } catch (error) {
                els.speakBtn.textContent = '🔊 듣기';
                els.speakBtn.disabled = false;
                showStatus(`음성 재생 실패: ${error.message}`, 'error');
            }
        }
        
        function handleMic() {
            if (isRecording) {
                recognition.stop();
            } else {
                clearAll();
                recognition.lang = langCodeMap[els.sourceLangSelect.value];
                recognition.start();
            }
        }
        
        function clearResult() {
            els.translation.textContent = '번역 결과가 여기에 표시됩니다';
            els.pronunciation.textContent = '발음 표기가 여기에 표시됩니다';
            els.speakBtn.disabled = true;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        }

        function clearAll() {
            els.inputText.value = '';
            clearResult();
        }

        function showStatus(message, type = '') {
            els.status.textContent = message;
            els.status.className = 'status ' + type;
            if (message) setTimeout(() => { els.status.textContent = ''; els.status.className = 'status'; }, 3000);
        }

        // Enter 키로 번역
        els.inputText.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleTranslate();
            }
        });

        window.addEventListener('load', () => {
            setupSpeechRecognition();
            showStatus('준비 완료', 'success');
        });
    </script>
</body>
</html>
