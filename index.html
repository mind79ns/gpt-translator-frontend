<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>GPT 번역기 (음성 자동 인식)</title>
    <style>
        html, body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #F8F9FA; }
        .main-card { max-width: 650px; margin: 20px auto; padding: 24px; background-color: #FFFFFF; border: 1px solid #DADCE0; border-radius: 8px; box-shadow: 0 1px 2px 0 rgba(60, 64, 67, .3), 0 1px 3px 1px rgba(60, 64, 67, .15); }
        h1 { color: #202124; font-size: 1.5em; font-weight: 500; margin-top: 0; text-align: left; }
        .subtitle { font-size: 0.9em; color: #5F6368; margin-bottom: 24px; text-align: left; }
        textarea { width: 100%; height: 120px; padding: 12px; font-size: 16px; border: 1px solid #DADCE0; border-radius: 4px; resize: none; box-sizing: border-box; margin-bottom: 12px; }
        .controls { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 8px; margin-bottom: 16px; }
        select, button { padding: 10px 16px; font-size: 16px; border-radius: 4px; border: 1px solid #DADCE0; cursor: pointer; background-color: #fff; }
        select { flex-grow: 1; }
        button { background-color: #1A73E8; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #186ac9; }
        #micBtn { background-color: #EA4335; }
        #micBtn:hover { background-color: #d63c2c; }
        #micBtn.recording { background-color: #FF6B6B; animation: pulse 1.5s infinite; }
        #speakBtn { background-color: #34A853; }
        #speakBtn:hover { background-color: #2d8f47; }
        #speakBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .result-box { padding: 16px; background-color: #F1F3F4; border-radius: 4px; border: 1px solid #DADCE0; min-height: 100px; text-align: left; position: relative; }
        #translation { font-size: 1.1em; color: #202124; white-space: pre-wrap; }
        #pronunciation { margin-top: 8px; font-style: italic; color: #5F6368; font-size: 0.9em; }
        .loading { text-align: center; color: #888; }
        .error { color: #EA4335; }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>🎤 GPT 번역기 (AI 음성 자동 인식)</h1>
        <div class="subtitle">말씀하시면 자동으로 언어를 감지해서 번역해 드립니다. 번역 결과를 음성으로도 들을 수 있어요!</div>
        
        <textarea id="inputText" placeholder="번역할 텍스트를 입력하거나 음성 버튼을 누르고 말씀해주세요."></textarea>
        
        <div class="voice-controls" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <select id="voiceSelect" style="flex-grow:1;">
                <option value="alloy">목소리: alloy (남성)</option>
                <option value="echo">목소리: echo (남성)</option>
                <option value="fable">목소리: fable (남성)</option>
                <option value="onyx">목소리: onyx (남성)</option>
                <option value="nova">목소리: nova (여성)</option>
                <option value="shimmer">목소리: shimmer (여성)</option>
            </select>
            <input type="range" id="volumeControl" min="0.5" max="4" value="2" step="0.1" style="margin-left:10px;">
            <label for="volumeControl" style="font-size:0.9em; margin-left:5px;">소리크기</label>
        </div>
        
        <div class="controls">
            <select id="targetLang">
                <option value="Vietnamese">베트남어로 번역</option>
                <option value="Korean">한국어로 번역</option>
                <option value="English">영어로 번역</option>
            </select>
            <button onclick="translateText()">📝 번역하기</button>
            <button id="micBtn" onclick="toggleMic()">🎤 음성 입력</button>
        </div>
        
        <div id="micStatus" style="color: #EA4335; font-size: 0.9em; margin-top: 8px;"></div>
        <div id="detectedLang" style="color: #1A73E8; font-size: 0.9em; margin-top: 4px; font-weight: bold;"></div>

        <div class="result-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                <div style="flex-grow: 1;">
                    <div id="translation">번역 결과가 여기에 표시됩니다.</div>
                    <div id="pronunciation"></div>
                </div>
                <button id="speakBtn" onclick="speakTranslation()" disabled style="margin-left: 10px;">🔊 듣기</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_SERVER_URL = "https://knstranslator.netlify.app/.netlify/functions/translate";

        const inputTextarea = document.getElementById('inputText');
        const micStatusDiv = document.getElementById('micStatus');
        const detectedLangDiv = document.getElementById('detectedLang');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        const voiceSelect = document.getElementById('voiceSelect');
        const volumeControl = document.getElementById('volumeControl');
        
        let recognition;
        let currentTranslation = '';
        let currentAudioSource = null;
        let audioContext;

        if ('webkitSpeechRecognition' in window) {
            setupSpeechRecognition();
        } else {
            micBtn.style.display = 'none';
            micStatusDiv.innerText = "죄송합니다. 이 브라우저는 음성 입력을 지원하지 않습니다.";
        }

        function setupSpeechRecognition() {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'ko-KR';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputTextarea.value = transcript;
                stopMic();
                if (transcript.trim()) {
                    translateText();
                }
            };

            recognition.onerror = (event) => {
                micStatusDiv.innerText = "음성 인식 오류: " + event.error;
                stopMic();
            };

            recognition.onstart = () => {
                micStatusDiv.innerText = "🎤 마이크가 켜졌습니다. 말씀하세요...";
                micBtn.innerHTML = "⏹️ 중지";
                micBtn.classList.add('recording');
            };

            recognition.onend = () => {
                micStatusDiv.innerText = "";
                micBtn.innerHTML = "🎤 음성 입력";
                micBtn.classList.remove('recording');
            };
        }

        function toggleMic() {
            if (micBtn.classList.contains('recording')) {
                stopMic();
            } else {
                startMic();
            }
        }

        function startMic() {
            if (recognition) {
                inputTextarea.value = "";
                recognition.start();
            }
        }

        function stopMic() {
            if (recognition) {
                recognition.stop();
            }
        }

        async function speakTranslation() {
            if (!currentTranslation) return;
            
            if (currentAudioSource) {
                currentAudioSource.stop();
                currentAudioSource = null;
                speakBtn.innerHTML = '🔊 듣기';
                return;
            }
            
            speakBtn.innerHTML = '🔄 로딩 중...';
            speakBtn.disabled = true;

            try {
                const response = await fetch(API_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'speak',
                        inputText: currentTranslation,
                        voice: voiceSelect.value
                    }),
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `서버 오류: ${response.status}`);
                }

                const audioBlob = await response.blob();
                
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }

                const source = audioContext.createBufferSource();
                const gainNode = audioContext.createGain();
                
                gainNode.gain.value = parseFloat(volumeControl.value);
                
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const arrayBuffer = await audioBlob.arrayBuffer();
                audioContext.decodeAudioData(arrayBuffer, (buffer) => {
                    source.buffer = buffer;
                    source.start(0);
                    currentAudioSource = source;
                    speakBtn.innerHTML = '⏸️ 중지';
                    speakBtn.disabled = false;
                    
                    source.onended = () => {
                        speakBtn.innerHTML = '🔊 듣기';
                        currentAudioSource = null;
                    };
                });

            } catch (error) {
                console.error('TTS 처리 오류:', error);
                speakBtn.innerHTML = '⚠️ 오류';
                speakBtn.disabled = false;
                alert('음성 합성 중 오류가 발생했습니다: ' + error.message);
            }
        }

        async function translateText() {
            const inputText = inputTextarea.value.trim();
            const targetLang = document.getElementById('targetLang').value;
            const translationDiv = document.getElementById('translation');
            const pronunciationDiv = document.getElementById('pronunciation');

            if (!inputText) return;

            if (currentAudioSource) {
                currentAudioSource.stop();
            }

            translationDiv.innerHTML = '<div class="loading">🔄 번역 중...</div>';
            pronunciationDiv.innerText = "";
            speakBtn.disabled = true;

            try {
                const response = await fetch(API_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'translate', 
                        inputText, 
                        targetLang 
                    }),
                });

                if (!response.ok) {
                    throw new Error(`서버 오류 ${response.status}`);
                }

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error);
                }
                
                currentTranslation = result.translation || "번역 결과가 없습니다.";
                translationDiv.innerText = currentTranslation;
                pronunciationDiv.innerText = result.pronunciation ? '발음: ' + result.pronunciation : '';
                speakBtn.disabled = false;
                
            } catch(error) {
                translationDiv.innerHTML = `<div class="error">오류: ${error.message}</div>`;
            }
        }

        inputTextarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                translateText();
            }
        });
    </script>
</body>
</html>
