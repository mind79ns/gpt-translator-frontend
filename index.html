<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>GPT 번역기 (음성 자동 인식)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #F8F9FA;
        }
        
        .main-card {
            max-width: 650px;
            margin: 20px auto;
            padding: 24px;
            background-color: #FFFFFF;
            border: 1px solid #DADCE0;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, .3), 0 1px 3px 1px rgba(60, 64, 67, .15);
        }
        
        h1 { color: #202124; font-size: 1.5em; font-weight: 500; margin-top: 0; text-align: left; }
        .subtitle { font-size: 0.9em; color: #5F6368; margin-bottom: 24px; text-align: left; }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #DADCE0;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        select, button {
            padding: 10px 16px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #DADCE0;
            cursor: pointer;
            background-color: #fff;
        }
        select { flex-grow: 1; }
        button { background-color: #1A73E8; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #186ac9; }
        
        #micBtn { background-color: #EA4335; }
        #micBtn:hover { background-color: #d63c2c; }
        #micBtn.recording { background-color: #FF6B6B; animation: pulse 1.5s infinite; }
        
        #speakBtn { background-color: #34A853; }
        #speakBtn:hover { background-color: #2d8f47; }
        #speakBtn:disabled { background-color: #ccc; cursor: not-allowed; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .result-box {
            padding: 16px;
            background-color: #F1F3F4;
            border-radius: 4px;
            border: 1px solid #DADCE0;
            min-height: 100px;
            text-align: left;
            position: relative;
        }
        
        #translation { font-size: 1.1em; color: #202124; white-space: pre-wrap; }
        #pronunciation { margin-top: 8px; font-style: italic; color: #5F6368; font-size: 0.9em; }
        
        .loading { text-align: center; color: #888; }
        .error { color: #EA4335; }
        #micStatus { color: #EA4335; font-size: 0.9em; margin-top: 8px; }
        #detectedLang { color: #1A73E8; font-size: 0.9em; margin-top: 4px; font-weight: bold; }
        
        .voice-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .auto-detect-info {
            background-color: #E8F0FE;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 0.9em;
            color: #1A73E8;
        }
        
        .lang-confidence {
            font-size: 0.8em;
            color: #666;
            margin-left: 8px;
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 4px;
            font-size: 0.8em;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>🎤 GPT 번역기 (AI 음성 자동 인식)</h1>
        <div class="subtitle">말씀하시면 자동으로 언어를 감지해서 번역해 드립니다. 번역 결과를 음성으로도 들을 수 있어요!</div>
        
        <div class="auto-detect-info">
            💡 <strong>새로운 기능:</strong> 음성 입력 시 한국어, 베트남어, 영어를 자동으로 감지합니다!
        </div>
        
        <textarea id="inputText" placeholder="번역할 텍스트를 입력하거나 음성 버튼을 누르고 말씀해주세요."></textarea>
        
        <div class="voice-controls">
            <div>
                <label for="autoDetect" style="font-size: 0.9em;">
                    <input type="checkbox" id="autoDetect" checked> 자동 언어 감지
                </label>
                <select id="speechLang" style="margin-left: 10px; display: none;">
                    <option value="ko-KR">음성: 한국어</option>
                    <option value="en-US">음성: 영어</option>
                    <option value="vi-VN">음성: 베트남어</option>
                </select>
            </div>
            <select id="voiceSelect" style="margin-left: 10px;">
                <option value="alloy">alloy (남성)</option>
                <option value="echo">echo (남성)</option>
                <option value="fable">fable (남성)</option>
                <option value="onyx">onyx (남성)</option>
                <option value="nova">nova (여성)</option>
                <option value="shimmer">shimmer (여성)</option>
            </select>
        </div>
        
        <div class="controls">
            <select id="targetLang">
                <option value="Vietnamese">베트남어로 번역</option>
                <option value="Korean">한국어로 번역</option>
                <option value="English">영어로 번역</option>
            </select>
            <button onclick="translateText()">📝 번역하기</button>
            <button id="micBtn" onclick="toggleMic()">🎤 음성 입력</button>
        </div>
        
        <div id="micStatus"></div>
        <div id="detectedLang"></div>

        <div class="result-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                <div style="flex-grow: 1;">
                    <div id="translation">번역 결과가 여기에 표시됩니다.</div>
                    <div id="pronunciation"></div>
                </div>
                <button id="speakBtn" onclick="speakTranslation()" disabled style="margin-left: 10px;">🔊 듣기</button>
            </div>
        </div>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>
    
    <script>
        const API_SERVER_URL = "https://knstranslator.netlify.app/.netlify/functions/translate";

        const inputTextarea = document.getElementById('inputText');
        const micStatusDiv = document.getElementById('micStatus');
        const detectedLangDiv = document.getElementById('detectedLang');
        const micBtn = document.getElementById('micBtn');
        const speakBtn = document.getElementById('speakBtn');
        const speechLangSelect = document.getElementById('speechLang');
        const autoDetectCheckbox = document.getElementById('autoDetect');
        const voiceSelect = document.getElementById('voiceSelect');
        const debugInfo = document.getElementById('debugInfo');
        
        let recognition;
        let currentTranslation = '';
        let currentTargetLang = '';
        let currentAudio = null;

        const langMappings = {
            'ko': { name: '한국어', code: 'ko-KR', flag: '🇰🇷' },
            'en': { name: '영어', code: 'en-US', flag: '🇺🇸' },
            'vi': { name: '베트남어', code: 'vi-VN', flag: '🇻🇳' }
        };

        function showDebug(message) {
            debugInfo.style.display = 'block';
            debugInfo.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '<br>';
        }

        autoDetectCheckbox.addEventListener('change', function() {
            speechLangSelect.style.display = this.checked ? 'none' : 'inline-block';
        });

        if ('webkitSpeechRecognition' in window) {
            setupSpeechRecognition();
        } else {
            micBtn.style.display = 'none';
            micStatusDiv.innerText = "죄송합니다. 이 브라우저는 음성 입력을 지원하지 않습니다.";
        }

        function setupSpeechRecognition() {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                const confidence = event.results[0][0].confidence;
                
                inputTextarea.value = transcript;
                
                const detectedLang = estimateLanguage(transcript);
                detectedLangDiv.innerHTML = `${detectedLang.flag} 감지된 언어: ${detectedLang.name} (신뢰도: ${Math.round(confidence * 100)}%)`;
                
                showDebug(`음성 인식 완료: "${transcript}" (${detectedLang.name}, 신뢰도: ${Math.round(confidence * 100)}%)`);
                stopMic();
                
                if (transcript.trim()) {
                    setTimeout(() => translateText(), 500);
                }
            };

            recognition.onerror = function(event) {
                micStatusDiv.innerText = "음성 인식 오류: " + event.error;
                showDebug(`음성 인식 오류: ${event.error}`);
                stopMic();
            };

            recognition.onstart = function() {
                micStatusDiv.innerText = "🎤 마이크가 켜졌습니다. 말씀하세요...";
                micBtn.innerHTML = "⏹️ 중지";
                micBtn.classList.add('recording');
                detectedLangDiv.innerHTML = "";
            };

            recognition.onend = function() {
                micStatusDiv.innerText = "";
                micBtn.innerHTML = "🎤 음성 입력";
                micBtn.classList.remove('recording');
            };
        }

        function estimateLanguage(text) {
            const koreanRegex = /[가-힣]/g;
            const vietnameseRegex = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđ]/g;
            
            const koreanCount = (text.match(koreanRegex) || []).length;
            const vietnameseCount = (text.match(vietnameseRegex) || []).length;
            
            if (koreanCount > 0) return langMappings['ko'];
            if (vietnameseCount > 0) return langMappings['vi'];
            return langMappings['en'];
        }

        function toggleMic() {
            if (micBtn.innerHTML === "⏹️ 중지") {
                stopMic();
            } else {
                startMic();
            }
        }

        function startMic() {
            if (recognition) {
                if (autoDetectCheckbox.checked) {
                    recognition.lang = 'ko-KR';
                    showDebug('자동 언어 감지 모드로 음성 인식 시작');
                } else {
                    recognition.lang = speechLangSelect.value;
                    showDebug(`수동 선택 모드: ${speechLangSelect.value}`);
                }
                
                inputTextarea.value = "";
                recognition.start();
            }
        }

        function stopMic() {
            if (recognition) {
                recognition.stop();
            }
        }

        async function speakTranslation() {
            if (!currentTranslation) return;
            
            // 재생 중일 경우 중지
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                speakBtn.innerHTML = '🔊 듣기';
                return;
            }
            
            speakBtn.innerHTML = '🔄 로딩 중...';
            speakBtn.disabled = true;

            const voice = voiceSelect.value;
            showDebug(`음성 합성 요청 시작: "${currentTranslation}" (음성: ${voice})`);

            try {
                const requestBody = { 
                    action: 'speak',
                    inputText: currentTranslation,
                    voice: voice
                };
                
                const response = await fetch(API_SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody),
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                currentAudio = new Audio(audioUrl);

                currentAudio.onplaying = function() {
                    speakBtn.innerHTML = '⏸️ 중지';
                    speakBtn.disabled = false;
                };

                currentAudio.onended = function() {
                    speakBtn.innerHTML = '🔊 듣기';
                    speakBtn.disabled = false;
                };

                currentAudio.play();
                showDebug('음성 재생 시작');

            } catch (error) {
                showDebug(`음성 합성 오류: ${error.message}`);
                speakBtn.innerHTML = '⚠️ 오류';
                speakBtn.disabled = false;
                alert('음성 합성 중 오류가 발생했습니다: ' + error.message);
            }
        }

        async function translateText() {
            const inputText = inputTextarea.value.trim();
            const targetLang = document.getElementById('targetLang').value;
            const translationDiv = document.getElementById('translation');
            const pronunciationDiv = document.getElementById('pronunciation');

            if (!inputText) {
                translationDiv.innerText = "텍스트를 입력해주세요.";
                pronunciationDiv.innerText = "";
                speakBtn.disabled = true;
                return;
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            translationDiv.innerHTML = '<div class="loading">🔄 번역 중... 잠시만 기다려주세요.</div>';
            pronunciationDiv.innerText = "";
            speakBtn.disabled = true;
            currentTranslation = '';
            currentTargetLang = targetLang;

            showDebug(`번역 요청 시작: "${inputText}" -> ${targetLang}`);

            try {
                const requestBody = { action: 'translate', inputText, targetLang };
                
                const response = await fetch(API_SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody),
                });

                showDebug(`응답 상태: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const result = await response.json();

                if (result.error) {
                    translationDiv.innerHTML = `<div class="error">오류 발생: ${result.error}</div>`;
                    pronunciationDiv.innerText = "";
                } else {
                    currentTranslation = result.translation || "번역 결과가 없습니다.";
                    translationDiv.innerText = currentTranslation;
                    pronunciationDiv.innerText = result.pronunciation ? '발음: ' + result.pronunciation : '';
                    speakBtn.disabled = false;
                    showDebug(`번역 완료: ${currentTranslation}`);
                }
            } catch(error) {
                showDebug(`Fetch 오류: ${error.message}`);
                translationDiv.innerHTML = `<div class="error">네트워크 오류: ${error.message}</div>`;
                pronunciationDiv.innerText = "";
            }
        }

        window.addEventListener('load', function() {
            showDebug('고급 번역기 로드됨');
            showDebug(`음성 합성 지원: ${'speechSynthesis' in window ? 'YES' : 'NO'}`);
            showDebug(`음성 인식 지원: ${'webkitSpeechRecognition' in window ? 'YES' : 'NO'}`);
        });

        inputTextarea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                translateText();
            }
        });
    </script>
</body>
</html>
}
