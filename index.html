<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPT 양방향 음성 번역기 Pro v5.0 - Polished</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #4F46E5; --secondary: #7C3AED; --bg: #ffffff; --text: #212529;
            --text-secondary: #868e96; --border: #e0e0e0; --card-bg: #f8f9fa;
            --success: #51cf66; --warning: #ffd43b; --error: #ff6b6b;
            --speaker-a: #4F46E5; --speaker-b: #10B981; --google-blue: #4285F4; --openai-green: #10A37F;
        }
        
        [data-theme="dark"] {
            --primary: #6366F1; --secondary: #8B5CF6; --bg: #1a1a1a; --text: #ffffff;
            --text-secondary: #a0a0a0; --border: #333333; --card-bg: #2a2a2a;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            min-height: 100vh; padding: 10px;
        }
        
        .container { 
            max-width: 500px; margin: 0 auto; background: var(--bg); 
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
        }
        
        /* 수정된 헤더 UI */
        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            color: white; padding: 20px; text-align: center;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header h1 { 
            font-size: 20px;
            margin: 0;
            text-align: center;
            flex-grow: 1; /* 제목이 중앙 공간을 차지하도록 */
        }
        
        .header-controls {
            display: flex;
            gap: 10px;
        }
        
        .theme-toggle, .settings-toggle, .dashboard-toggle {
            background: rgba(255,255,255,0.2); border: none; border-radius: 20px;
            padding: 5px 10px; cursor: pointer; font-size: 16px;
        }

        .language-selector { 
            display: flex; align-items: center; justify-content: space-between; gap: 10px; 
        }
        
        .language-selector select { 
            width: 40%; padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2); color: white; font-weight: bold;
            -webkit-appearance: none; appearance: none; text-align: center;
        }
        
        .language-selector select option { color: black; }
        
        .language-selector button { 
            width: 40px; height: 40px; border-radius: 50%; border: none; background: white;
            color: var(--primary); font-size: 20px; cursor: pointer; flex-shrink: 0; 
        }
        
        .auto-detect-badge {
            background: #FEF3C7; color: #92400E; padding: 4px 8px;
            border-radius: 12px; font-size: 11px; margin-top: 10px; display: none;
        }
        
        .auto-detect-badge.active { display: inline-block; }
        
        .content { padding: 20px; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 2000; padding: 20px;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content-wrapper {
            background: var(--bg); border-radius: 20px; width: 100%;
            max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 20px;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border);
        }
        .modal-title { font-size: 20px; font-weight: bold; color: var(--text); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        
        .usage-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .usage-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .usage-card-value { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .usage-card-label { font-size: 12px; color: var(--text-secondary); }
        .chart-container, .limit-settings { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .chart-title, .limit-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: var(--text); }
        .simple-bar-chart { display: flex; align-items: flex-end; height: 120px; gap: 8px; }
        .bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; }
        .bar-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }
        .bar-value { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; color: var(--text); }
        .limit-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .limit-label { font-size: 12px; color: var(--text-secondary); }
        .limit-input { width: 100px; padding: 5px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; text-align: right; }
        .limit-progress { width: 100%; height: 20px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .limit-progress-bar { height: 100%; background: linear-gradient(90deg, var(--success) 0%, var(--warning) 70%, var(--error) 100%); transition: width 0.3s; }
        .limit-percentage { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 5px; }
        
        .settings-panel { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; max-height: 500px; overflow-y: auto; }
        .settings-panel.active { display: block; }
        .settings-title { font-size: 14px; font-weight: bold; color: var(--text); margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .settings-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; }
        .settings-grid { display: grid; gap: 20px; }
        .setting-item { display: flex; flex-direction: column; gap: 8px; }
        .setting-label { font-size: 12px; color: var(--text-secondary); }
        .context-settings, .cache-settings { background: var(--bg); padding: 15px; border-radius: 12px; }
        .context-toggle { display: flex; justify-content: space-between; align-items: center; }
        .context-toggle:not(:last-child) { margin-bottom: 10px; }
        .context-label { font-size: 13px; color: var(--text); }
        .toggle-switch { position: relative; width: 50px; height: 25px; background: #ccc; border-radius: 25px; cursor: pointer; }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle-switch.active::after { transform: translateX(25px); }
        .voice-type-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .voice-type-btn { padding: 8px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); cursor: pointer; font-size: 11px; text-align: center; }
        .voice-type-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
        .voice-type-btn.female { border-color: #EC4899; } .voice-type-btn.female.active { background: #EC4899; }
        .voice-type-btn.male { border-color: #3B82F6; } .voice-type-btn.male.active { background: #3B82F6; }
        
        .vocabulary-section { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .vocabulary-section.active { display: block; }
        .vocabulary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .vocabulary-title { font-size: 14px; font-weight: bold; color: var(--text); }
        .vocabulary-add-btn { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .vocabulary-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .vocab-tab { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; font-size: 12px; cursor: pointer; text-align: center; }
        .vocab-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .vocabulary-list { max-height: 200px; overflow-y: auto; }
        .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--bg); border-radius: 5px; margin-bottom: 5px; cursor: pointer; }
        .vocab-item:hover { transform: translateX(3px); }
        .vocab-word { font-weight: bold; color: var(--text); font-size: 13px; }
        .vocab-meaning { color: var(--text-secondary); font-size: 12px; }
        .vocab-actions { display: flex; gap: 5px; }
        .vocab-btn { background: var(--primary); color: white; border: none; padding: 3px 6px; border-radius: 3px; font-size: 10px; cursor: pointer; }
        .vocab-btn.delete { background: var(--error); }
        .vocab-add-modal { display: none; z-index: 3000; }
        .vocab-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 5px; margin-bottom: 10px; font-size: 14px; }
        .vocab-modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        .vocab-modal-btn { padding: 8px 16px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .vocab-modal-btn.save { background: var(--primary); color: white; }
        .vocab-modal-btn.cancel { background: var(--border); color: var(--text); }

        .recent-plays { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .recent-plays.active { display: block; }
        .recent-plays-title { font-size: 13px; font-weight: bold; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .recent-plays-toggle { background: var(--primary); color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .recent-play-list { max-height: 150px; overflow-y: auto; }
        .recent-play-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; font-size: 12px; cursor: pointer; }
        .recent-play-item:hover { transform: translateX(3px); }
        .recent-play-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .recent-play-actions { display: flex; gap: 5px; align-items: center; }
        .recent-play-btn { background: var(--primary); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .engine-indicator { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: white; }
        .engine-indicator.google { background: var(--google-blue); } .engine-indicator.openai { background: var(--openai-green); }
        .cache-indicator { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; background: var(--success); color: white; }

        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; }
        .mode-btn { padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; text-align: center; }
        .mode-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
        
        .conversation-mode { display: none; } .conversation-mode.active { display: block; }
        .speaker-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .speaker-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 3px solid transparent; position: relative; }
        .speaker-card.speaker-a { border-color: var(--speaker-a); } .speaker-card.speaker-b { border-color: var(--speaker-b); }
        .speaker-card.active { transform: scale(1.05); }
        .speaker-card.active::after { content: '🎤'; position: absolute; top: 5px; right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .speaker-title { font-weight: bold; margin-bottom: 8px; } .speaker-lang { font-size: 14px; color: var(--text-secondary); }
        .conversation-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .conv-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .conv-btn-start { background: var(--success); } .conv-btn-stop { background: var(--error); }
        .conv-btn-clear { background: var(--text-secondary); } .conv-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .conversation-history { max-height: 300px; overflow-y: auto; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); padding: 10px; }
        .conversation-message { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
        .message-speaker { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 14px; flex-shrink: 0; }
        .message-speaker.speaker-a { background: var(--speaker-a); } .message-speaker.speaker-b { background: var(--speaker-b); }
        .message-content { flex: 1; } .message-original { font-weight: bold; color: var(--text); margin-bottom: 4px; }
        .message-translation { color: var(--text-secondary); font-style: italic; }
        
        .normal-mode { display: block; } .normal-mode.hidden { display: none; }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .normal-mode textarea { width: 100%; min-height: 100px; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; resize: none; background: var(--bg); color: var(--text); }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:hover { transform: translateY(-2px); }
        .btn-translate { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .btn-voice { background: #FF6B6B; } .btn-voice.recording { animation: pulse 1s infinite; }
        .btn-clear { background: #868e96; }
        .btn-vocabulary { background: #17A2B8; }
        
        .result-section { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .result-label { font-size: 12px; color: var(--text-secondary); font-weight: bold; }
        .result-actions { display: flex; gap: 8px; align-items: center; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
        #translation { font-size: 18px; color: var(--text); line-height: 1.5; min-height: 40px; }
        .pronunciation-section { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .pronunciation-label { font-size: 12px; color: var(--text-secondary); font-weight: bold; margin-bottom: 8px; }
        #pronunciation { font-size: 14px; color: var(--text-secondary); }

        .translation-stats { background: var(--card-bg); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--text-secondary); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-item strong { color: var(--primary); display: block; font-size: 16px; }

        .status { text-align: center; font-size: 12px; color: var(--text-secondary); min-height: 20px; margin-top: 10px; }
        .status.error { color: var(--error); } .status.success { color: var(--success); } .status.warning { color: var(--warning); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>GPT 번역기 Pro v5.0</h1>
                <div class="header-controls">
                    <button class="dashboard-toggle" onclick="toggleDashboard()">📊</button>
                    <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                </div>
            </div>
            <div class="language-selector">
                <select id="sourceLangSelect"><option value="Korean">한국어</option><option value="Vietnamese">베트남어</option><option value="English">영어</option></select>
                <button onclick="swapLanguages()">⇄</button>
                <select id="targetLangSelect"><option value="Vietnamese">베트남어</option><option value="Korean">한국어</option><option value="English">영어</option></select>
            </div>
            <span class="auto-detect-badge" id="autoDetectBadge"></span>
        </div>
        
        <div class="content">
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-title"><span>⚙️ 설정</span><button class="settings-close" onclick="toggleSettings()">×</button></div>
                <div class="settings-grid">
                     <div class="context-settings">
                         <div class="context-toggle"><span class="context-label">🧠 문맥 기반 번역</span><div class="toggle-switch" id="contextToggle" onclick="contextSystem.toggle()"></div></div>
                         <div class="context-toggle"><span class="context-label">🚀 실시간 번역</span><div class="toggle-switch" id="realtimeToggle" onclick="toggleRealtime()"></div></div>
                     </div>
                     <div class="setting-item">
                         <label class="setting-label">🔊 TTS 엔진</label>
                         <select id="ttsEngineMode" onchange="saveSettings()" style="width: 100%; padding: 8px; border-radius: 5px;">
                            <option value="auto">🤖 자동</option><option value="google">🔵 Google</option>
                            <option value="openai">🟢 OpenAI</option><option value="smart">💡 스마트</option>
                         </select>
                     </div>
                     <div class="setting-item">
                         <label class="setting-label">🎤 OpenAI 음성</label>
                         <div class="voice-type-selector" id="openai-voice-selector">
                            <button class="voice-type-btn female" onclick="selectVoiceType(event, 'nova')">Nova</button><button class="voice-type-btn female" onclick="selectVoiceType(event, 'shimmer')">Shimmer</button>
                            <button class="voice-type-btn male" onclick="selectVoiceType(event, 'alloy')">Alloy</button><button class="voice-type-btn male" onclick="selectVoiceType(event, 'echo')">Echo</button>
                            <button class="voice-type-btn male" onclick="selectVoiceType(event, 'fable')">Fable</button><button class="voice-type-btn male" onclick="selectVoiceType(event, 'onyx')">Onyx</button>
                         </div>
                     </div>
                     <div class="setting-item">
                         <label class="setting-label">🎤 Google 음성</label>
                         <div class="voice-type-selector" id="google-voice-selector">
                            <button class="voice-type-btn female" onclick="selectGoogleVoice(event, 'vi-VN-Standard-A')">VN-A</button><button class="voice-type-btn male" onclick="selectGoogleVoice(event, 'vi-VN-Standard-B')">VN-B</button>
                            <button class="voice-type-btn female" onclick="selectGoogleVoice(event, 'ko-KR-Standard-A')">KR-A</button><button class="voice-type-btn male" onclick="selectGoogleVoice(event, 'ko-KR-Standard-D')">KR-D</button>
                         </div>
                     </div>
                     <div class="cache-settings"><button onclick="clearAllCache()" style="width: 100%; padding: 10px; background: var(--error); color: white;">🗑️ 캐시 초기화</button></div>
                     <input type="hidden" id="voiceSelect" value="nova"><input type="hidden" id="googleVoiceSelect" value="vi-VN-Standard-A">
                </div>
            </div>

            <div class="vocabulary-section" id="vocabularySection">
                <div class="vocabulary-header"><span class="vocabulary-title">📚 나의 단어장</span><button class="vocabulary-add-btn" onclick="showAddVocabModal()">+ 추가</button></div>
                <div class="vocabulary-tabs">
                    <div class="vocab-tab active" onclick="vocabularySystem.switchTab(event, 'ko-vi')">한→베</div><div class="vocab-tab" onclick="vocabularySystem.switchTab(event, 'vi-ko')">베→한</div>
                    <div class="vocab-tab" onclick="vocabularySystem.switchTab(event, 'all')">전체</div>
                </div>
                <div class="vocabulary-list" id="vocabularyList"></div>
            </div>

            <div class="recent-plays" id="recentPlays">
                <div class="recent-plays-title"><span>🔄 최근 재생</span><button class="recent-plays-toggle" onclick="toggleRecentPlays()">접기</button></div>
                <div class="recent-play-list" id="recentPlayList"></div>
            </div>
            
            <div class="mode-selector">
                <div class="mode-btn active" id="normalModeBtn" onclick="switchToNormalMode()">📝 일반 번역</div>
                <div class="mode-btn" id="conversationModeBtn" onclick="switchToConversationMode()">💬 대화 모드</div>
            </div>
            
            <div class="conversation-mode" id="conversationMode">
                <div class="speaker-info">
                    <div class="speaker-card speaker-a" id="speakerCardA"><div class="speaker-title">🙋‍♂️ 화자 A</div><div class="speaker-lang" id="speakerLangA"></div></div>
                    <div class="speaker-card speaker-b" id="speakerCardB"><div class="speaker-title">🙋‍♀️ 화자 B</div><div class="speaker-lang" id="speakerLangB"></div></div>
                </div>
                <div class="conversation-controls">
                    <button class="conv-btn conv-btn-start" id="startConversationBtn" onclick="startConversation()">🎤 시작</button>
                    <button class="conv-btn conv-btn-stop" id="stopConversationBtn" onclick="stopConversation()" disabled>⏹️ 종료</button>
                    <button class="conv-btn conv-btn-clear" onclick="clearConversation()">🗑️ 지우기</button>
                </div>
                <div class="conversation-history" id="conversationHistory"></div>
            </div>
            
            <div class="normal-mode" id="normalMode">
                <div class="input-wrapper"><textarea id="inputText" placeholder="번역할 텍스트를 입력하세요..."></textarea></div>
                <div class="controls">
                    <button class="btn-translate" onclick="handleTranslate()"><span>📝</span> 번역</button>
                    <button class="btn-voice" id="voiceBtn" onclick="handleVoiceTranslate()"><span>🎤</span> 음성</button>
                    <button class="btn-clear" onclick="clearAll()"><span>🗑️</span> 지우기</button>
                    <button class="btn-vocabulary" onclick="toggleVocabulary()"><span>📚</span> 단어장</button>
                </div>
