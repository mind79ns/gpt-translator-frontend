<!-- index.html (교체본) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT 양방향 음성 번역기</title>
  <!-- (기존 CSS 생략하지 않고 그대로 포함) -->
  <style>
    /* 그대로 기존 스타일 사용 (생략하지 않음) */
    /* ... (원본 스타일을 그대로 유지하세요) ... */
    /* For brevity in this snippet, assume your original CSS is pasted here exactly as before. */
  </style>
</head>
<body>
  <!-- 기존 HTML 내용 동일 (버튼/입력 등 동일) -->
  <!-- (원본 index.html의 body 내부 구조 그대로 유지하세요) -->
  <!-- 아래는 기존 파일의 주요 부분을 유지하고, 스크립트만 업데이트 합니다. -->

  <!-- (복사한 기존 HTML 구조 여기) -->
  <!-- For clarity, I'm including full original markup up to script tag (same as your current index.html) -->
  <div class="container">
    <div class="header">
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      <h1>🌐 GPT 양방향 음성 번역기</h1>
      <div class="language-selector">
        <select id="sourceLangSelect">
          <option value="Korean">한국어</option>
          <option value="Vietnamese">베트남어</option>
          <option value="English">영어</option>
        </select>
        <button onclick="swapLanguages()">⇄</button>
        <select id="targetLangSelect">
          <option value="Vietnamese">베트남어</option>
          <option value="Korean">한국어</option>
          <option value="English">영어</option>
        </select>
      </div>
      <span class="auto-detect-badge" id="autoDetectBadge">자동 감지</span>
    </div>

    <div class="content">
      <div class="input-wrapper">
        <textarea id="inputText" placeholder="번역할 텍스트를 입력하거나 음성 번역 버튼을 누르세요..."></textarea>
      </div>

      <div class="settings">
        <select id="voiceSelect">
          <option value="nova">Nova (여성/선명)</option>
          <option value="shimmer">Shimmer (여성/부드러움)</option>
          <option value="alloy">Alloy (남성/차분)</option>
          <option value="echo">Echo (남성/깊음)</option>
          <option value="fable">Fable (남성/표현력)</option>
          <option value="onyx">Onyx (남성/저음)</option>
        </select>
        <div class="volume-control">
          <label for="volumeControl" style="font-size:12px; color:var(--text-secondary);">소리 크기</label>
          <input type="range" id="volumeControl" min="0.2" max="1" value="0.8" step="0.1">
          <span class="volume-value" id="volumeValue">80%</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn-translate" onclick="handleTranslate()">
          <span>📝</span> 번역하기
        </button>
        <button class="btn-voice" id="voiceBtn" onclick="handleVoiceTranslate()">
          <span>🎤</span> <span id="voiceText">음성 번역</span>
        </button>
        <button class="btn-clear" onclick="clearAll()">
          <span>🗑️</span> 지우기
        </button>
        <button class="btn-history" onclick="showHistory()">
          <span>📚</span> 기록
        </button>
      </div>

      <div class="result-section">
        <div class="result-header">
          <span class="result-label">번역 결과</span>
          <div>
            <button class="btn-copy" id="copyBtn" onclick="copyTranslation()" disabled>📋 복사</button>
            <button class="btn-speak" id="speakBtn" onclick="handleSpeak()" disabled>🔊 듣기</button>
          </div>
        </div>
        <div id="translation">번역 결과가 여기에 표시됩니다</div>
      </div>

      <div class="pronunciation-section">
        <div class="pronunciation-label" onclick="togglePronunciation()">
          발음 도우미 <span id="pronToggle">▼</span>
        </div>
        <div id="pronunciation">발음 표기가 여기에 표시됩니다</div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">번역 기록</span>
        <button class="modal-close" onclick="hideHistory()">×</button>
      </div>
      <div id="historyList"></div>
      <button class="clear-history" onclick="clearHistory()">기록 모두 삭제</button>
    </div>
  </div>

  <script>
    // ================= 설정 =================
    const API_URL = 'https://knstranslator.netlify.app/.netlify/functions/translate'; // 배포 도메인 사용
    const els = {
      inputText: document.getElementById('inputText'),
      translation: document.getElementById('translation'),
      pronunciation: document.getElementById('pronunciation'),
      status: document.getElementById('status'),
      voiceBtn: document.getElementById('voiceBtn'),
      voiceText: document.getElementById('voiceText'),
      speakBtn: document.getElementById('speakBtn'),
      copyBtn: document.getElementById('copyBtn'),
      sourceLangSelect: document.getElementById('sourceLangSelect'),
      targetLangSelect: document.getElementById('targetLangSelect'),
      voiceSelect: document.getElementById('voiceSelect'),
      volumeControl: document.getElementById('volumeControl'),
      volumeValue: document.getElementById('volumeValue'),
      autoDetectBadge: document.getElementById('autoDetectBadge'),
      historyModal: document.getElementById('historyModal'),
      historyList: document.getElementById('historyList')
    };

    let currentTranslation = '';
    let recognition;
    let isRecording = false;
    let currentAudio = null;
    const audioCache = new Map();

    const STORAGE_KEYS = {
      volume: 'ttsVolume',
      voice: 'preferredVoice',
      sourceLang: 'sourceLang',
      targetLang: 'targetLang',
      theme: 'theme',
      history: 'translationHistory'
    };

    const langCodeMap = {
      'Korean': 'ko-KR',
      'Vietnamese': 'vi-VN',
      'English': 'en-US'
    };

    // ========= 초기화 ==============
    function loadSettings() {
      const savedVolume = localStorage.getItem(STORAGE_KEYS.volume) || '0.8';
      els.volumeControl.value = savedVolume;
      els.volumeValue.textContent = Math.round(savedVolume * 100) + '%';

      const savedVoice = localStorage.getItem(STORAGE_KEYS.voice);
      if (savedVoice) els.voiceSelect.value = savedVoice;

      const savedSourceLang = localStorage.getItem(STORAGE_KEYS.sourceLang);
      if (savedSourceLang) els.sourceLangSelect.value = savedSourceLang;

      const savedTargetLang = localStorage.getItem(STORAGE_KEYS.targetLang);
      if (savedTargetLang) els.targetLangSelect.value = savedTargetLang;

      const savedTheme = localStorage.getItem(STORAGE_KEYS.theme) || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEYS.volume, els.volumeControl.value);
      localStorage.setItem(STORAGE_KEYS.voice, els.voiceSelect.value);
      localStorage.setItem(STORAGE_KEYS.sourceLang, els.sourceLangSelect.value);
      localStorage.setItem(STORAGE_KEYS.targetLang, els.targetLangSelect.value);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem(STORAGE_KEYS.theme, newTheme);
      document.querySelector('.theme-toggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
    }

    // ========== 언어 감지/히스토리 (기존 로직 유지) ===========
    function detectLanguage(text) {
      const koreanRegex = /[가-힣]/;
      const vietnameseRegex = /[àáạảãâầấậẩẫăằắặẳẵèéẹẻẽêềếệểễìíịỉĩòóọỏõôồốộổỗơờớợởỡùúụủũưừứựửữỳýỵỷỹđĐ]/i;
      let detectedLang = 'English';
      if (koreanRegex.test(text)) detectedLang = 'Korean';
      else if (vietnameseRegex.test(text)) detectedLang = 'Vietnamese';

      if (els.sourceLangSelect.value !== detectedLang) {
        els.sourceLangSelect.value = detectedLang;
        if (detectedLang === 'Korean') els.targetLangSelect.value = 'Vietnamese';
        else if (detectedLang === 'Vietnamese') els.targetLangSelect.value = 'Korean';
        else els.targetLangSelect.value = 'Korean';
        els.autoDetectBadge.classList.add('active');
        setTimeout(() => els.autoDetectBadge.classList.remove('active'), 2000);
      }
      return detectedLang;
    }

    function getHistory() {
      const history = localStorage.getItem(STORAGE_KEYS.history);
      return history ? JSON.parse(history) : [];
    }
    function saveToHistory(source, translation, sourceLang, targetLang) {
      const history = getHistory();
      const newItem = { source, translation, sourceLang, targetLang, time: new Date().toLocaleString('ko-KR') };
      history.unshift(newItem);
      if (history.length > 10) history.pop();
      localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(history));
    }
    function showHistory() {
      const history = getHistory();
      if (history.length === 0) {
        els.historyList.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">번역 기록이 없습니다</p>';
      } else {
        els.historyList.innerHTML = history.map((item, index) => `
          <div class="history-item" onclick="loadFromHistory(${index})">
            <div class="history-source">${item.sourceLang} → ${item.targetLang}</div>
            <div class="history-translation">${item.source} → ${item.translation}</div>
            <div class="history-time">${item.time}</div>
          </div>
        `).join('');
      }
      els.historyModal.style.display = 'block';
    }
    function hideHistory() { els.historyModal.style.display = 'none'; }
    function loadFromHistory(index) {
      const history = getHistory(); const item = history[index];
      els.inputText.value = item.source; els.sourceLangSelect.value = item.sourceLang; els.targetLangSelect.value = item.targetLang;
      hideHistory(); handleTranslate();
    }
    function clearHistory() { if (confirm('모든 번역 기록을 삭제하시겠습니까?')) { localStorage.removeItem(STORAGE_KEYS.history); showHistory(); } }

    // ========== 복사 ===============
    async function copyTranslation() {
      if (!currentTranslation) return;
      try {
        await navigator.clipboard.writeText(currentTranslation);
        const originalText = els.copyBtn.textContent;
        els.copyBtn.textContent = '✅ 복사됨';
        setTimeout(() => els.copyBtn.textContent = originalText, 2000);
      } catch (err) { showStatus('복사 실패', 'error'); }
    }

    // ========== 음성 인식 ==============
    function setupSpeechRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        els.voiceBtn.disabled = true;
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isRecording = true; els.voiceBtn.classList.add('recording'); els.voiceText.textContent = '듣는 중...'; showStatus('🎤 말씀해 주세요...', 'success');
      };
      recognition.onresult = (event) => {
        els.inputText.value = event.results[0][0].transcript;
        detectLanguage(event.results[0][0].transcript);
        stopRecording(); handleTranslate();
      };
      recognition.onerror = (event) => { showStatus(`음성 인식 오류: ${event.error}`, 'error'); stopRecording(); };
      recognition.onend = () => stopRecording();
    }
    function stopRecording() { isRecording = false; els.voiceBtn.classList.remove('recording'); els.voiceText.textContent = '음성 번역'; }
    function handleVoiceTranslate() {
      if (!recognition) { showStatus('음성 인식을 사용할 수 없습니다', 'error'); return; }
      if (isRecording) recognition.stop(); else { clearAll(); recognition.lang = langCodeMap[els.sourceLangSelect.value]; recognition.start(); }
    }

    // ========== 번역 요청 ================
    async function handleTranslate() {
      const text = els.inputText.value.trim();
      if (!text) return;
      clearResult();
      els.translation.innerHTML = '<span>🔄</span> 번역 중...';
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'translate', inputText: text, targetLang: els.targetLangSelect.value })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        currentTranslation = data.translation || '';
        const pronunciation = data.pronunciation || data.pronunciation_hangul || '';
        els.translation.textContent = currentTranslation || '번역 결과 없음';
        els.pronunciation.textContent = pronunciation || ' ';
        els.speakBtn.disabled = !currentTranslation;
        els.copyBtn.disabled = !currentTranslation;
        saveToHistory(text, currentTranslation, els.sourceLangSelect.value, els.targetLangSelect.value);
        showStatus('✅ 번역 완료', 'success');
      } catch (error) {
        els.translation.textContent = '번역 실패';
        showStatus(`❌ ${error.message}`, 'error');
      }
    }

    // ========== 브라우저 TTS (Web Speech API) ===========
    function speakWithBrowserTTS(text, lang = 'vi-VN', rate = 0.95, volume = 0.9) {
      if (!('speechSynthesis' in window)) return false;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = lang;
      utter.rate = rate;
      utter.volume = volume;
      const voices = speechSynthesis.getVoices();
      const v = voices.find(x => x.lang && x.lang.startsWith(lang.split('-')[0])) || voices.find(x => x.lang && x.lang.startsWith('vi')) || voices[0];
      if (v) utter.voice = v;
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
      return true;
    }

    // ========== handleSpeak (교체된 핵심) ===========
    async function handleSpeak() {
      if (!currentTranslation) return;

      // 토글 재생/정지
      if (currentAudio && !currentAudio.paused) {
        currentAudio.pause(); currentAudio.currentTime = 0; els.speakBtn.textContent = '🔊 듣기'; currentAudio = null; return;
      }

      els.speakBtn.textContent = '⏳'; els.speakBtn.disabled = true;
      try {
        const targetLang = els.targetLangSelect.value;
        const volume = parseFloat(els.volumeControl.value || 0.8);

        // 우선: 베트남어는 브라우저 TTS 우선 사용 (권장)
        if (targetLang === 'Vietnamese' && ('speechSynthesis' in window)) {
          // 바로 브라우저가 읽도록 함 — 번역된 'currentTranslation'을 읽음 (현지 발음이 자연스러움)
          const success = speakWithBrowserTTS(currentTranslation, 'vi-VN', 0.95, Math.min(1, volume));
          if (success) {
            els.speakBtn.textContent = '⏸️'; els.speakBtn.disabled = false;
            showStatus('🎧 브라우저 TTS로 재생 중 (vi-VN)', 'success');
            return;
          }
          // 실패하면 서버 TTS fallback으로 진행
        }

        // 서버 TTS (비(非)베트남어 또는 브라우저 미지원 시)
        const cacheKey = `${currentTranslation}_${els.voiceSelect.value}_${els.targetLangSelect.value}`;
        let audioBlob = null;

        if (audioCache.has(cacheKey) && els.targetLangSelect.value !== 'Vietnamese') {
          audioBlob = audioCache.get(cacheKey);
        }

        if (!audioBlob) {
          const resp = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'speak',
              inputText: currentTranslation,
              voice: els.voiceSelect.value,
              language: els.targetLangSelect.value
            })
          });
          if (!resp.ok) throw new Error(`서버 오류 ${resp.status}`);
          audioBlob = await resp.blob();

          // 베트남어는 캐시하지 않음(볼륨/품질 이슈 대비)
          if (els.targetLangSelect.value !== 'Vietnamese') {
            audioCache.set(cacheKey, audioBlob);
            if (audioCache.size > 10) {
              const firstKey = audioCache.keys().next().value;
              audioCache.delete(firstKey);
            }
          }
        }

        const audioUrl = URL.createObjectURL(audioBlob);
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        currentAudio = new Audio();
        currentAudio.src = audioUrl;

        // 볼륨 튜닝: 베트남어는 서버에서도 보정 가능하도록 multiplier 적용
        let finalVolume = volume;
        if (els.targetLangSelect.value === 'Vietnamese') {
          finalVolume = Math.min(1.0, volume * 3.0);
        }
        currentAudio.volume = finalVolume;
        currentAudio.preload = 'auto';

        currentAudio.addEventListener('playing', () => {
          els.speakBtn.textContent = '⏸️'; els.speakBtn.disabled = false;
          showStatus('🎵 재생 중', 'success');
        });
        currentAudio.addEventListener('ended', () => {
          els.speakBtn.textContent = '🔊 듣기'; els.speakBtn.disabled = false;
          URL.revokeObjectURL(audioUrl); currentAudio = null;
        });
        currentAudio.addEventListener('error', (e) => {
          console.error('오디오 에러', e);
          els.speakBtn.textContent = '🔊 듣기'; els.speakBtn.disabled = false;
          showStatus('음성 재생 실패', 'error');
          currentAudio = null;
        });

        // 지연후 재생 (안정성)
        setTimeout(async () => {
          try { await currentAudio.play(); } catch (err) {
            console.error('재생 실패', err);
            els.speakBtn.textContent = '🔊 듣기'; els.speakBtn.disabled = false;
            showStatus('음성 재생 실패', 'error');
          }
        }, 150);

      } catch (err) {
        console.error('handleSpeak 에러', err);
        els.speakBtn.textContent = '🔊 듣기'; els.speakBtn.disabled = false;
        showStatus(`음성 재생 실패: ${err.message}`, 'error');
      }
    }

    function clearResult() {
      els.translation.textContent = '번역 결과가 여기에 표시됩니다';
      els.pronunciation.textContent = '발음 표기가 여기에 표시됩니다';
      els.speakBtn.disabled = true; els.copyBtn.disabled = true;
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    }

    function clearAll() { els.inputText.value = ''; clearResult(); }

    function showStatus(message, type = '') {
      els.status.textContent = message; els.status.className = 'status ' + type;
      if (message) setTimeout(() => { els.status.textContent = ''; els.status.className = 'status'; }, 3000);
    }

    els.volumeControl.addEventListener('input', (e) => {
      const volume = e.target.value; els.volumeValue.textContent = Math.round(volume * 100) + '%'; localStorage.setItem(STORAGE_KEYS.volume, volume);
      if (currentAudio) currentAudio.volume = volume;
    });

    els.voiceSelect.addEventListener('change', (e) => { localStorage.setItem(STORAGE_KEYS.voice, e.target.value); });
    els.sourceLangSelect.addEventListener('change', saveSettings);
    els.targetLangSelect.addEventListener('change', saveSettings);
    els.inputText.addEventListener('input', (e) => { if (e.target.value.length > 2) detectLanguage(e.target.value); });

    function togglePronunciation() {
      const pronDiv = els.pronunciation; const toggle = document.getElementById('pronToggle');
      if (pronDiv.style.display === 'none') { pronDiv.style.display = 'block'; toggle.textContent = '▼'; } else { pronDiv.style.display = 'none'; toggle.textContent = '▶'; }
    }
    function swapLanguages() { const s = els.sourceLangSelect.value; const t = els.targetLangSelect.value; els.sourceLangSelect.value = t; els.targetLangSelect.value = s; saveSettings(); clearAll(); }

    els.inputText.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleTranslate(); } });
    window.onclick = (event) => { if (event.target === els.historyModal) hideHistory(); };

    window.addEventListener('load', () => { loadSettings(); setupSpeechRecognition(); showStatus('준비 완료', 'success'); });
  </script>
</body>
</html>
