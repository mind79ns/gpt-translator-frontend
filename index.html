<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPT 양방향 음성 번역기 Pro v5.0 - Final Revision</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4F46E5; --secondary: #7C3AED; --bg: #ffffff; --text: #212529;
            --text-secondary: #868e96; --border: #e0e0e0; --card-bg: #f8f9fa;
            --success: #51cf66; --warning: #ffd43b; --error: #ff6b6b;
            --google-blue: #4285F4; --openai-green: #10A37F;
        }
        [data-theme="dark"] {
            --primary: #6366F1; --secondary: #8B5CF6; --bg: #1a1a1a; --text: #ffffff;
            --text-secondary: #a0a0a0; --border: #333333; --card-bg: #2a2a2a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--bg); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 20px; text-align: center; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 20px; margin: 0; text-align: center; flex-grow: 1; }
        .header-controls { display: flex; gap: 10px; }
        .theme-toggle, .settings-toggle, .dashboard-toggle { background: rgba(255,255,255,0.2); border: none; border-radius: 20px; padding: 5px 10px; cursor: pointer; font-size: 16px; }
        .language-selector { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .language-selector select { width: 40%; padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.2); color: white; font-weight: bold; -webkit-appearance: none; appearance: none; text-align: center; }
        .language-selector select option { color: black; }
        .language-selector button { width: 40px; height: 40px; border-radius: 50%; border: none; background: white; color: var(--primary); font-size: 20px; cursor: pointer; flex-shrink: 0; }
        .auto-detect-badge { background: #FEF3C7; color: #92400E; padding: 4px 8px; border-radius: 12px; font-size: 11px; margin-top: 10px; display: none; }
        .auto-detect-badge.active { display: inline-block; }
        .content { padding: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content-wrapper { background: var(--bg); border-radius: 20px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
        .modal-title { font-size: 20px; font-weight: bold; color: var(--text); }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary); }
        .usage-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .usage-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .usage-card-value { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .usage-card-label { font-size: 12px; color: var(--text-secondary); }
        .chart-container, .limit-settings { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .chart-title, .limit-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: var(--text); }
        .simple-bar-chart { display: flex; align-items: flex-end; height: 120px; gap: 8px; }
        .bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; }
        .bar-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }
        .bar-value { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; color: var(--text); }
        .limit-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .limit-label { font-size: 12px; color: var(--text-secondary); }
        .limit-input { width: 100px; padding: 5px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; text-align: right; }
        .limit-progress { width: 100%; height: 20px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .limit-progress-bar { height: 100%; background: linear-gradient(90deg, var(--success) 0%, var(--warning) 70%, var(--error) 100%); transition: width 0.3s; }
        .limit-percentage { text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 5px; }
        
        .settings-panel { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; }
        .settings-panel.active { display: block; }
        .settings-title { font-size: 16px; font-weight: bold; color: var(--text); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .settings-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 24px; }
        .settings-grid { display: grid; gap: 20px; }
        .setting-item { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 15px; }
        .setting-label { font-size: 13px; color: var(--text); }
        .setting-label small { font-size: 11px; color: var(--text-secondary); display: block; margin-top: 4px; }
        .setting-control { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .setting-control select, .setting-control input[type="range"] { width: 150px; }
        .setting-control select { padding: 5px; border-radius: 5px; font-size: 12px; border: 1px solid var(--border); }
        .setting-value { font-size: 12px; color: var(--primary); min-width: 40px; text-align: right; }
        .toggle-switch { position: relative; width: 50px; height: 25px; background: #ccc; border-radius: 25px; cursor: pointer; }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 21px; height: 21px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle-switch.active::after { transform: translateX(25px); }

        .recent-plays { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .recent-plays.active { display: block; }
        .recent-plays-title { font-size: 13px; font-weight: bold; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .recent-plays-toggle { background: var(--primary); color: white; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .recent-play-list { max-height: 150px; overflow-y: auto; }
        .recent-play-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; font-size: 12px; cursor: pointer; }
        .recent-play-item:hover { transform: translateX(3px); }
        .recent-play-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px; }
        .recent-play-actions { display: flex; gap: 5px; align-items: center; }
        .recent-play-btn { background: var(--primary); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
        .engine-indicator { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; color: white; }
        .engine-indicator.google { background: var(--google-blue); } .engine-indicator.openai { background: var(--openai-green); }
        .cache-indicator { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; background: var(--success); color: white; }

        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: var(--card-bg); padding: 10px; border-radius: 12px; }
        .mode-btn { padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); cursor: pointer; font-weight: bold; text-align: center; }
        .mode-btn.active { border-color: var(--primary); background: var(--primary); color: white; }
        
        .conversation-mode { display: none; } .conversation-mode.active { display: block; }
        .speaker-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .speaker-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 3px solid transparent; position: relative; }
        .speaker-card.speaker-a { border-color: var(--primary); } .speaker-card.speaker-b { border-color: #10B981; }
        .speaker-card.active { transform: scale(1.05); }
        .speaker-card.active::after { content: '🎤'; position: absolute; top: 5px; right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .speaker-title { font-weight: bold; margin-bottom: 8px; } .speaker-lang { font-size: 14px; color: var(--text-secondary); }
        .conversation-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .conv-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .conv-btn-start { background: var(--success); } .conv-btn-stop { background: var(--error); }
        .conv-btn-clear { background: var(--text-secondary); } .conv-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .conversation-history { max-height: 300px; overflow-y: auto; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); padding: 10px; }
        .conversation-message { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
        .message-speaker { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 14px; flex-shrink: 0; }
        .message-speaker.speaker-a { background: var(--primary); } .message-speaker.speaker-b { background: #10B981; }
        .message-content { flex: 1; } .message-original { font-weight: bold; color: var(--text); margin-bottom: 4px; }
        .message-translation { color: var(--text-secondary); font-style: italic; }
        
        .normal-mode { display: block; } .normal-mode.hidden { display: none; }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
        .input-action-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 11px; }
        .normal-mode textarea { width: 100%; min-height: 120px; padding: 15px; padding-right: 80px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; resize: none; background: var(--bg); color: var(--text); }
        .controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        button { padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:hover { transform: translateY(-2px); }
        .btn-translate { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .btn-voice { background: #FF6B6B; } .btn-voice.recording { animation: pulse 1s infinite; }
        .btn-clear { background: #868e96; }
        .btn-history { background: #6F42C1; }
        
        .result-section { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .result-label { font-size: 12px; color: var(--text-secondary); font-weight: bold; }
        .result-actions { display: flex; gap: 8px; align-items: center; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .btn-action:disabled { background: #ccc; cursor: not-allowed; }
        #translation { font-size: 18px; color: var(--text); line-height: 1.5; min-height: 40px; word-break: break-word; }
        .pronunciation-section { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .pronunciation-label { font-size: 12px; color: var(--text-secondary); font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        #pronunciation-content { font-size: 14px; color: var(--text-secondary); }

        .translation-stats { background: var(--card-bg); border-radius: 8px; padding: 10px; font-size: 12px; color: var(--text-secondary); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-item strong { color: var(--primary); display: block; font-size: 16px; }

        .status { text-align: center; font-size: 12px; color: var(--text-secondary); min-height: 20px; margin-top: 10px; }
        .status.error { color: var(--error); } .status.success { color: var(--success); } .status.warning { color: var(--warning); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>GPT 번역기 Pro v5.0</h1>
                <div class="header-controls">
                    <button class="dashboard-toggle" onclick="toggleDashboard()">📊</button>
                    <button class="settings-toggle" onclick="toggleSettings()">⚙️</button>
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                </div>
            </div>
            <div class="language-selector">
                <select id="sourceLangSelect"><option value="Korean">한국어</option><option value="Vietnamese">베트남어</option><option value="English">영어</option></select>
                <button onclick="swapLanguages()">⇄</button>
                <select id="targetLangSelect"><option value="Vietnamese">베트남어</option><option value="Korean">한국어</option><option value="English">영어</option></select>
            </div>
            <span class="auto-detect-badge" id="autoDetectBadge"></span>
        </div>
        
        <div class="content">
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-title"><span>⚙️ 설정</span><button class="settings-close" onclick="toggleSettings()">×</button></div>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label class="setting-label" for="ttsEngineMode">🔊 TTS 엔진 선택<small>Google: 무료/일반 | OpenAI: 유료/고품질</small></label>
                        <div class="setting-control"><select id="ttsEngineMode"><option value="auto">🤖 자동 선택 (추천)</option><option value="google">🔵 Google TTS</option><option value="openai">🟢 OpenAI TTS</option><option value="smart">💡 스마트 모드</option></select></div>
                    </div>
                    <div class="setting-item" id="autoModeSettings">
                        <label class="setting-label" for="autoThreshold">자동 모드 임계값<small>이 글자 수 이하는 Google TTS 사용</small></label>
                        <div class="setting-control"><input type="range" id="autoThreshold" min="10" max="200" value="50" step="10"><span class="setting-value" id="thresholdValue">50자</span></div>
                    </div>
                    <div class="setting-item">
                        <label class="setting-label" for="voiceSelect">음성 선택 (OpenAI)</label>
                        <div class="setting-control"><select id="voiceSelect"><option value="nova">Nova (여성/선명)</option><option value="shimmer">Shimmer (여성/부드러움)</option><option value="alloy">Alloy (남성/차분)</option><option value="echo">Echo (남성/깊음)</option><option value="fable">Fable (남성/표현력)</option><option value="onyx">Onyx (남성/저음)</option></select></div>
                    </div>
                    <div class="setting-item">
                        <label class="setting-label" for="googleVoiceSelect">음성 선택 (Google)</label>
                        <div class="setting-control"><select id="googleVoiceSelect"><option value="vi-VN-Standard-A">🇻🇳 Standard-A (여)</option><option value="vi-VN-Standard-B">🇻🇳 Standard-B (남)</option><option value="vi-VN-Standard-C">🇻🇳 Standard-C (여)</option><option value="vi-VN-Standard-D">🇻🇳 Standard-D (남)</option><option value="ko-KR-Standard-A">🇰🇷 Standard-A (여)</option><option value="ko-KR-Standard-B">🇰🇷 Standard-B (여)</option><option value="ko-KR-Standard-C">🇰🇷 Standard-C (남)</option><option value="ko-KR-Standard-D">🇰🇷 Standard-D (남)</option></select></div>
                    </div>
                    <div class="setting-item">
                        <label class="setting-label" for="volumeControl">볼륨</label>
                        <div class="setting-control"><input type="range" id="volumeControl" min="0.1" max="1" value="0.8" step="0.1"><span class="setting-value" id="volumeValue">80%</span></div>
                    </div>
                    <div class="setting-item">
                         <label class="setting-label">발음 도우미<small>OFF 시 API 요청 비용이 절감됩니다.</small></label>
                         <div class="setting-control"><div class="toggle-switch" id="pronunciationToggle"></div></div>
                    </div>
                    <div class="setting-item">
                        <label class="setting-label">💾 캐시 설정<small>반복 요청 시 비용 절감 및 속도 향상</small></label>
                        <div class="setting-control"><button onclick="clearAllCache()" style="padding: 6px 12px; font-size: 11px; background-color: var(--error); border: none; border-radius: 5px; color: white;">🗑️ 캐시 초기화</button></div>
                    </div>
                </div>
            </div>

            <div class="recent-plays" id="recentPlays">
                <div class="recent-plays-title"><span>🔄 최근 재생</span><button class="recent-plays-toggle" onclick="toggleRecentPlays()">접기</button></div>
                <div class="recent-play-list" id="recentPlayList"></div>
            </div>
            
            <div class="mode-selector">
                <div class="mode-btn active" id="normalModeBtn" onclick="switchToNormalMode()">📝 일반 번역</div>
                <div class="mode-btn" id="conversationModeBtn" onclick="switchToConversationMode()">💬 대화 모드</div>
            </div>
            
            <div class="conversation-mode" id="conversationMode">
                <div class="speaker-info">
                    <div class="speaker-card speaker-a" id="speakerCardA"><div class="speaker-title">🙋‍♂️ 화자 A</div><div class="speaker-lang" id="speakerLangA"></div></div>
                    <div class="speaker-card speaker-b" id="speakerCardB"><div class="speaker-title">🙋‍♀️ 화자 B</div><div class="speaker-lang" id="speakerLangB"></div></div>
                </div>
                <div class="conversation-controls">
                    <button class="conv-btn conv-btn-start" id="startConversationBtn" onclick="startConversation()">🎤 시작</button>
                    <button class="conv-btn conv-btn-stop" id="stopConversationBtn" onclick="stopConversation()" disabled>⏹️ 종료</button>
                    <button class="conv-btn conv-btn-clear" onclick="clearConversation()">🗑️ 지우기</button>
                </div>
                <div class="conversation-history" id="conversationHistory"></div>
            </div>
            
            <div class="normal-mode" id="normalMode">
                <div class="input-wrapper">
                    <textarea id="inputText" placeholder="번역할 텍스트를 입력하세요..."></textarea>
                    <div class="input-actions">
                        <button class="input-action-btn" onclick="copyInputText()">복사</button>
                        <button class="input-action-btn" onclick="pasteFromClipboard()">붙여넣기</button>
                    </div>
                </div>
                <div class="controls">
                    <button class="btn-translate" onclick="handleTranslate()"><span>📝</span> 번역하기</button>
                    <button class="btn-voice" id="voiceBtn" onclick="handleVoiceTranslate()"><span>🎤</span> 음성 번역</button>
                    <button class="btn-clear" onclick="clearAll()"><span>🗑️</span> 모두 지우기</button>
                    <button class="btn-history" onclick="showHistory()"><span>📜</span> 기록 보기</button>
                </div>
                <div class="result-section">
                    <div class="result-header">
                        <span class="result-label">번역 결과<span id="cacheIndicator" class="cache-indicator" style="display: none;">캐시됨</span></span>
                        <div class="result-actions">
                            <button class="btn-action" onclick="copyTranslation()" id="copyBtn" disabled>📋 복사</button>
                            <button class="btn-action" id="speakBtn" onclick="handleSpeak()" disabled>🔊 듣기<span id="engineIndicator" class="engine-indicator" style="display: none;"></span></button>
                        </div>
                    </div>
                    <div id="translation"></div>
                </div>
                <div class="pronunciation-section" id="pronunciationSection">
                    <div class="pronunciation-label" onclick="togglePronunciationView()">발음 도우미 <span id="pronToggleIcon">▼</span></div>
                    <div id="pronunciation-content"></div>
                </div>
                <div class="translation-stats">
                    <div class="stat-item"><strong id="todayTranslations">0</strong><span>오늘 번역</span></div>
                    <div class="stat-item"><strong id="totalTranslations">0</strong><span>총 번역</span></div>
                    <div class="stat-item"><strong id="cacheHitRate">0%</strong><span>캐시 적중률</span></div>
                </div>
            </div>
            
            <div class="status" id="status"></div>
